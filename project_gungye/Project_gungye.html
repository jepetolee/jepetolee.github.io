        .avatar-upload .avatar-edit {
            position: absolute;

            z-index: 1;
            top: 20px;

        .avatar-upload .avatar-edit input {
            display: none;
        }

        .avatar-upload .avatar-edit input+label {
            display: inline-block;
            width: 34px;
            height: 34px;

            border: 1px solid transparent;

            font-weight: normal;
            transition: all 0.2s ease-in-out;
        }

        .avatar-upload .avatar-edit input+label:hover {
            background: #f1f1f1;
            border-color: #d6d6d6;
        }

        .avatar-upload .avatar-edit input+label:after {
            content: "\f040";
            font-family: 'FontAwesome';
            color: #757575;
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            text-align: center;
            margin: auto;
        }

        .avatar-upload .avatar-preview {
            width: 300px;
            height: 300px;
            position: relative;
            border-radius: 100%;
            border: 6px solid #F8F8F8;
            box-shadow: 0px 2px 4px 0px rgba(0, 0, 0, 0.1);
        }

        .avatar-upload .avatar-preview>div {
            width: 100%;
            height: 100%;
            border-radius: 100%;
            background-size: cover;
            background-repeat: no-repeat;

    <div class="container"style="text-align: center;">

            <div class="input-group">
                <div id="label-container" style="text-align:center;width:100%;"></div>

            <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>

            <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
            
                    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
                    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
            
                    <script src="https://static.codepen.io/assets/common/stopExecutionOnTimeout-157cd5b220a5c80d4ff8e0e70ac069bffd87a61252088146915e8726e5d9f147.js"></script>
                    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
                    <script type="text/javascript">
                        // More API functions here:
                        // https://github.com/googlecreativelab/teachablemachine-community/tree/master/libraries/image
                        // the link to your model provided by Teachable Machine export panel
                        const URL = "./my_model/";
                        let model, webcam, labelContainer, maxPredictions;
                        // Load the image model and setup the webcam
                        async function init() {
                            const modelURL = URL + "model.json";
                            const metadataURL = URL + "metadata.json";
                            // load the model and metadata
                            // Refer to tmImage.loadFromFiles() in the API to support files from a file picker
                            // or files from your local hard drive
                            // Note: the pose library adds "tmImage" object to your window (window.tmImage)
                            model = await tmImage.load(modelURL, metadataURL);
                            maxPredictions = model.getTotalClasses();   
                            
                            // Convenience function to setup a webcam
                            labelContainer = document.getElementById("label-container");
                            for (let i = 0; i < maxPredictions; i++) { // and class labels
                                labelContainer.appendChild(document.createElement("div"));
                            }
                        }
                        // run the webcam image through the image model
                        async function predict() {
                            // predict can take in an image, video or canvas html element
                            var image = document.getElementById("profile-image");
                            const prediction = await model.predict(image, false);
                            console.log(prediction)
                                var item=0;
                                var BESTONE=prediction[0].probability
                            for (let i = 0; i < maxPredictions; i++) {
                                var classPrediction = "";
                                if(prediction[i].probability >= 0.3) {
                                    classPrediction = '<div style="margin:10px;">'+ prediction[i].className + ' : ' + prediction[i].probability.toFixed(4)*100.0 + '%</div><div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: ' + prediction[i].probability.toFixed(4)*100 + '%" aria-valuenow="'+ prediction[i].probability.toFixed(4)*100+'" aria-valuemin="0" aria-valuemax="100"></div></div><br><br>';
                                }
                                if(prediction[i].probability >= BESTONE) {
                                    BESTONE=prediction[i].probability;
                                    item=i;
                                     }
                                labelContainer.childNodes[i].innerHTML = classPrediction; 
                                
                                                     
                            }
                            console.log(prediction[item])
                            if (prediction[item].className==='질투'){
                        location.href="https://jepetolee.github.io//project_gungye/envy1.html";
                    }
                    else if (prediction[item].className==='혐오'){
                        location.href="https://jepetolee.github.io//project_gungye/disgust.html";
                    }
                    else if (prediction[item].className==='호감'){
                        location.href="https://jepetolee.github.io//project_gungye/hope.html";
                    }
                    else if (prediction[item].className==='무표정'){
                        location.href="https://jepetolee.github.io//project_gungye/nonrelation.html";
                    }
                    else if (prediction[item].className==='웃음'){
                        location.href="https://jepetolee.github.io//project_gungye/laugh.html";
                    } 
                        }
                    </script>
                    <script id="rendered-js">
                        function readURL(input) {
                            if (input.files && input.files[0]) {
                                var reader = new FileReader();
                                reader.onload = function(e) {
                                    $('.file-upload-image').attr('src', e.target.result);
                                    $('#imagePreview').css('background-image', 'url(' + e.target.result + ')');
                                    $('#imagePreview').hide();
                                    $('#imagePreview').fadeIn(650);
                                };
                                reader.readAsDataURL(input.files[0]);
                                init().then(() => {
                                    console.log('hello');
                                    predict();
                                });
                            }
                        }
                        $("#imageUpload").change(function() {
                            readURL(this);
                        });

                    </script>
